<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 목록</title>
    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2171403 | 성명: 김관중'}"></p>
</head>
<body>
<h1>카테고리 목록</h1>

<p>
    <a th:href="@{/categories/create}">카테고리 등록</a>
</p>

<!-- 성공 / 오류 메시지 -->
<p th:if="${successMessage}" th:text="${successMessage}" style="color:green;"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red;"></p>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리 이름</th>
        <th>삭제</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<hr>
</body>
</html>
